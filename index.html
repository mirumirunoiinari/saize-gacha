<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title class="title">n円ガチャ</title>
    </head>

    <body>

        <div id="result_area">
            <p id="isOgori"></p>
            <p id="result"></p>
        </div>
        <div class="baner" id="banner">
            <h1>サイゼリヤ1000円ガチャ</h1>
            <div class="container">
                <div class="form-area">
            
                    <div class="checkbox" id="checkbox">
                        <label>
                            <input type="checkbox" id="isExcludePizza">ピザを除外する
                        </label>
                        <label>
                            <input type="checkbox" id="isExcludeDrink">ドリンクバーを除外する
                        </label>
                        <label>
                            <input type="checkbox" id="isExcludeWine">ワインを除外する
                        </label>
                        <label>
                            <input type="checkbox" id="isIncludeOgori">奢りガチャを有効にする
                        </label>
                        <div class="warning" >
                            奢りガチャは２％の確率で奢りが出ます。<br>
                            奢りが出た人は他の人の分も奢ります。
                        </div>
                    </div>
                </div>
            </div>
            <button id="button" class="btn">ガチャ！</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
